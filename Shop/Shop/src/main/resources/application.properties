spring.application.name=Shop
server.port=8083
#spring.config.import=configserver:http://localhost:8888
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
spring.cloud.config.enabled=false

logging.file.name=logs/app.log
logging.level.root=ERROR


spring.datasource.url=jdbc:mysql://localhost:3306/ShopDB
spring.datasource.username=root
spring.datasource.password=asmaa123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

logging.level.com.Shop_Microservice.Shop.Feigns.InventoryClient=DEBUG
logging.level.feign=DEBUG

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always


# Resilience4j CircuitBreaker config
resilience4j.circuitbreaker.instances.myBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.myBreaker.slidingWindowSize=5
resilience4j.circuitbreaker.instances.myBreaker.minimumNumberOfCalls=3
resilience4j.circuitbreaker.instances.myBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.myBreaker.waitDurationInOpenState=10s